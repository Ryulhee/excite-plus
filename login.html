<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>로그인 | EXCITE plus</title>
<link rel="stylesheet" href="assets/styles.css" />
</head>
<body class="login-split-body">
<div class="login-shell">
  <section class="login-visual" aria-hidden="false">
    <div class="login-visual-inner">
      <span class="logo-mark lg">E+</span>
      <h2>EXCITE plus</h2>
      <p class="login-visual-tag">ECMO 중환자의 vital, 검사, 태그, 분석을 하나의 흐름으로 연결합니다.</p>
      <ul class="feature-pulse-list">
        <li><i>♥</i> 생존군·사망군 vital 추세를 한눈에 비교</li>
        <li><i>⏱</i> ECMO 이벤트에 CSV를 자동으로 연결</li>
        <li><i>≈</i> 연구 태그와 분류값으로 대상 자료를 일관되게 관리</li>
      </ul>
    </div>
  </section>
  <section class="login-card">
    <div class="brand">
      <span class="logo-mark">E+</span>
      <div><h1>EXCITE plus</h1><p>EXCITE 내부 연구팀 시스템</p></div>
    </div>
    <p>EXCITE 연구팀 구성원만 사용할 수 있습니다. 로그인 후 Raw CSV 파일, 연구자료, 태그, 통계 분석 기능을 사용할 수 있습니다.</p>
    <div class="form-stack" style="margin-top:20px">
      <div class="field"><label>아이디</label><input id="loginEmail" class="input" type="text" placeholder="아이디를 입력하세요" autocomplete="username" /></div>
      <div class="field"><label>비밀번호</label><input id="loginPassword" class="input" type="password" placeholder="비밀번호를 입력하세요" /></div>
      <button id="loginSubmit" class="btn teal" type="button">로그인</button>
    </div>
    <div class="login-links">
      <a href="#" data-disabled-action="관리자에게 비밀번호 초기화를 요청해 주세요.">비밀번호 찾기</a>
      <a href="signup.html">회원가입</a>
    </div>
  </section>
</div>
<script src="assets/app.js"></script>
</body>
</html>
