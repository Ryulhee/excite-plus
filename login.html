<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>로그인 | EXCITE plus</title>
<link rel="stylesheet" href="assets/styles.css" />
</head>
<body class="login-body">
<section class="login-card">
  <div class="brand">
    <span class="logo-mark">E+</span>
    <div><h1>EXCITE plus</h1><p>EXCITE 내부 연구팀 시스템</p></div>
  </div>
  <p>EXCITE 연구팀 구성원만 사용할 수 있습니다. 로그인 후 Vital 파일, 연구자료, 태그, 통계 분석 기능을 사용할 수 있습니다.</p>
  <div class="form-stack" style="margin-top:20px">
    <div class="field"><label>이메일</label><input id="loginEmail" class="input" type="email" placeholder="이메일을 입력하세요" /></div>
    <div class="field"><label>비밀번호</label><input id="loginPassword" class="input" type="password" placeholder="비밀번호를 입력하세요" /></div>
    <button id="loginSubmit" class="btn teal" type="button">로그인</button>
  </div>
  <div class="login-links">
    <a href="#" data-disabled-action="관리자에게 비밀번호 초기화를 요청해 주세요.">비밀번호 찾기</a>
    <a href="signup.html">회원가입</a>
  </div>
</section>
<script src="assets/app.js"></script>
</body>
</html>
